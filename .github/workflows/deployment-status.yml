name: Deployment Status
on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.create-issue.outputs.issue-number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run lint check
        run: npm run lint
      - name: Run tests
        run: npm test
      - name: Get package version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              labels: ['deployment', 'in-progress'],
              body: `
              **Previous Commit**: ${context.payload.before}
              **Current Commit**: ${context.sha}
              **Package Version**: ${process.env.PACKAGE_VERSION}
              `
            });
            core.setOutput('issue-number', issue.number);
      - name: Post pre-deployment completion comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.issue-number }},
              body: "Pre-deployment checks completed"
            })

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact-name: ${{ steps.create-rollback.outputs.artifact-name }}
      checksum: ${{ steps.create-rollback.outputs.checksum }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Get package version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
      - name: Create rollback artifacts
        id: create-rollback
        run: |
          # Create rollback script with error handling
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "=== Starting Rollback Process ==="

          # Verify previous commit exists in repository
          if ! git rev-parse --verify "${{ github.event.before }}" > /dev/null 2>&1; then
            echo "ERROR: Previous commit ${{ github.event.before }} not found in repository"
            exit 1
          fi

          # Switch to previous commit
          echo "Switching to previous commit: ${{ github.event.before }}"
          git checkout "${{ github.event.before }}"

          # Clean and reinstall dependencies to match previous state
          echo "Reinstalling dependencies..."
          npm ci

          # Run dependency verification
          echo "Verifying dependencies..."
          npm audit || echo "Note: npm audit found warnings (not blocking rollback)"
          npm ls --depth=0

          echo "=== Rollback Process Completed Successfully ==="
          EOF

          # Make rollback script executable
          chmod +x rollback.sh

          # Create configuration backups directory
          mkdir -p rollback-backups

          # Backup package files
          cp package.json rollback-backups/package.json
          cp package-lock.json rollback-backups/package-lock.json

          # Backup environment template if exists
          if [ -f .env.template ]; then
            cp .env.template rollback-backups/.env.template
            echo "Environment template backed up"
          else
            echo "Note: .env.template not found, skipping backup"
          fi

          # Create dependency verification script
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "=== Dependency Verification ==="
          echo "Checking for dependency compatibility issues..."
          
          # Verify package integrity
          npm verify
          
          # Check for missing dependencies
          npm ls
          
          # Check node version compatibility
          NODE_REQUIRED=$(node -p "require('./package.json').engines?.node || '>=18'")
          echo "Required Node.js version: $NODE_REQUIRED"
          echo "Current Node.js version: $(node --version)"
          
          echo "=== Dependency Verification Complete ==="
          EOF

          chmod +x verify-dependencies.sh

          # Create rollback documentation
          cat > rollback-documentation.md << 'EOF'
          # Rollback Documentation
          
          ## Overview
          This rollback package reverts the application to the state before the current deployment (commit: ${{ github.event.before }}).
          
          ## Step-by-Step Rollback Instructions
          1. **Stop the running application**
             - Use your process manager to stop the Node.js application
             - Example: `pm2 stop mcpmark-cicd`
          
          2. **Download and extract the rollback package**
             - From the GitHub Actions run page, download the rollback artifact
             - Extract: `tar -xzf rollback-package-${{ github.sha }}.tar.gz`
             - Enter the directory: `cd rollback-package-${{ github.sha }}`
          
          3. **Run the rollback script**
             - Execute: `./rollback.sh`
             - The script will automatically switch to the previous commit and reinstall dependencies
          
          4. **Verify the rollback**
             - Run the dependency verification script: `./verify-dependencies.sh`
             - Start the application: `pm2 start mcpmark-cicd`
             - Check application logs for errors
          
          5. **Confirm deployment status**
             - Verify the application is responding correctly
             - Check monitoring tools for normal operation
          
          ## Emergency Rollback Notes
          - If the rollback script fails, manually checkout the previous commit: `git checkout ${{ github.event.before }}`
          - Manually reinstall dependencies: `npm ci`
          - Contact the DevOps team for assistance if issues persist
          EOF

          # Create compressed rollback package
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          tar -czf "${ARTIFACT_NAME}.tar.gz" rollback.sh verify-dependencies.sh rollback-backups/ rollback-documentation.md

          # Calculate SHA256 checksum
          CHECKSUM=$(sha256sum "${ARTIFACT_NAME}.tar.gz" | awk '{ print $1 }')

          # Set outputs for downstream jobs
          echo "::set-output name=artifact-name::${ARTIFACT_NAME}"
          echo "::set-output name=checksum::${CHECKSUM}"
      - name: Upload rollback artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-rollback.outputs.artifact-name }}
          path: |
            ${{ steps.create-rollback.outputs.artifact-name }}.tar.gz
            rollback.sh
            verify-dependencies.sh
            rollback-backups/
            rollback-documentation.md
          retention-days: 30
      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `
              ## 🔄 Rollback Plan Ready
              
              **Previous Commit**: ${{ github.event.before }}
              **Current Commit**: ${{ github.sha }}
              **Package Version**: ${process.env.PACKAGE_VERSION}
              **Artifact**: ${{ steps.create-rollback.outputs.artifact-name }}
              
              ✅ Rollback script created with robust error handling
              ✅ Configuration backups (package.json, package-lock.json)
              ✅ Dependency verification script
              ✅ Detailed step-by-step rollback documentation
              ✅ Compressed rollback package with SHA256 checksum
              ✅ Artifact uploaded to GitHub Actions (30-day retention)
              
              ### Quick Rollback Command
              \`\`\`bash
              # Download the rollback artifact from GitHub Actions
              wget "https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${{ steps.create-rollback.outputs.artifact-name }}.tar.gz"
              
              # Extract and use
              tar -xzf "${{ steps.create-rollback.outputs.artifact-name }}.tar.gz"
              cd "${{ steps.create-rollback.outputs.artifact-name }}"
              ./rollback.sh
              \`\`\`
              
              **Rollback script created**: true
              **Configuration backup**: true
              **SHA256**: ${{ steps.create-rollback.outputs.checksum }}
              `
            })

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: [pre-deployment, rollback-preparation]
    steps:
      - name: Update deployment issue status
        uses: actions/github-script@v7
        with:
          script: |
            # Remove in-progress label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              name: 'in-progress'
            });

            # Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              labels: ['completed']
            });

            # Post final completion comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `
              ## Deployment Completed Successfully
              
              **Rollback Artifact**: ${{ needs.rollback-preparation.outputs.artifact-name }}
              **SHA256 Checksum**: ${{ needs.rollback-preparation.outputs.checksum }}
              **Rollback Documentation**: Included in the uploaded artifact
              
              A complete rollback package has been saved to GitHub Actions for 30 days.
              Follow the instructions in the rollback documentation if reverting is needed.
              `
            });

            # Close the deployment tracking issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              state: 'closed'
            })