name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint checks
        id: eslint
        run: npm run lint

      - name: Run Prettier formatting checks
        id: prettier
        run: npx prettier --check .

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintOutput = `${{ steps.eslint.outputs.stdout || 'No ESLint output' }}`;
            const prettierOutput = `${{ steps.prettier.outputs.stdout || 'No Prettier output' }}`;
            const comment = `## Code Quality Report\n\n### ESLint Results\n${eslintOutput}\n\n### Prettier Results\n${prettierOutput}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  testing-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite with coverage
        id: test
        run: npm test -- --coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage/

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testOutput = `${{ steps.test.outputs.stdout || 'No test output' }}`;
            const comment = `## Test Coverage Report\n\n${testOutput}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check (npm audit)
        id: audit
        run: npm audit --json > audit.json || true

      - name: Parse vulnerability results
        id: parse-audit
        run: |
          if [ -f audit.json ]; then
            VULNS=$(jq -r '.advisories | length' audit.json)
            MODULES=$(jq -r '.modules | length' audit.json)
          else
            VULNS="0"
            MODULES="0"
          fi
          echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const vulns = `${{ steps.parse-audit.outputs.vulnerabilities }}`;
            const modules = `${{ steps.parse-audit.outputs.modules }}`;
            const comment = `## Security Scan Report\n\n### Dependencies\nTotal modules scanned: ${modules}\n\n### Vulnerabilities\nTotal vulnerabilities found: ${vulns}\n\nFor detailed results, view the npm audit output in job logs.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  build-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: npm run build

      - name: Validate endpoints (example check)
        id: validate
        run: |
          # Adjust this based on your application type
          # For static sites: Verify build directory exists
          if [ -d "build" ]; then
            echo "✅ Build directory exists"
          else
            echo "❌ Build directory not found"
            exit 1
          fi

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: build/

      - name: Post Build Validation Status
        uses: actions/github-script@v7
        with:
          script: |
            const buildOutput = `${{ steps.build.outputs.stdout || 'No build output' }}`;
            const validateOutput = `${{ steps.validate.outputs.stdout || 'No validation output' }}`;
            const comment = `## Build Validation\n\n### Build Status\n${buildOutput}\n\n### Endpoint Validation\n${validateOutput}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });